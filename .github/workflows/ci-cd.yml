name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile $(find app -name "*.py")

      - name: Ruff lint
        run: |
          ruff check app || true

      - name: Docker build
        run: |
          docker build -t clinic-appointment-api .

      - name: Render deploy hook
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then curl "$RENDER_DEPLOY_HOOK_URL"; else echo "No deploy hook configured"; fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
